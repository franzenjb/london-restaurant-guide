<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>London Restaurants</title>
<link href="https://fonts.googleapis.com/css2?family=Libre+Baskerville:wght@400;700&family=Source+Sans+Pro:wght@300;400;600;700&family=IBM+Plex+Mono:wght@400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<style>
:root {
  --arc-red: #ED1B2E; --arc-black: #1a1a1a; --arc-cream: #f7f5f2;
  --arc-gray-900: #2d2d2d; --arc-gray-700: #4a4a4a; --arc-gray-500: #737373;
  --arc-gray-300: #a3a3a3; --arc-gray-100: #e5e5e5; --arc-white: #fff;
  --font-headline: 'Libre Baskerville', Georgia, serif;
  --font-body: 'Source Sans Pro', 'Helvetica Neue', sans-serif;
  --font-data: 'IBM Plex Mono', Consolas, monospace;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: var(--font-body); background: var(--arc-cream); color: var(--arc-gray-900); height: 100vh; display: flex; flex-direction: column; overflow: hidden; }

/* Header */
header { background: var(--arc-black); padding: 14px 20px; display: flex; align-items: center; justify-content: space-between; flex-shrink: 0; }
.header-left { display: flex; align-items: center; gap: 12px; }
header h1 { font-family: var(--font-headline); font-size: 20px; font-weight: 700; color: var(--arc-white); }
header p { font-size: 12px; color: var(--arc-gray-300); margin-top: 1px; font-family: var(--font-data); }

/* Tabs */
#tabs { display: flex; background: var(--arc-white); border-bottom: 2px solid var(--arc-gray-100); flex-shrink: 0; }
.tab { flex: 1; padding: 12px; text-align: center; font-size: 13px; font-weight: 600; color: var(--arc-gray-500); cursor: pointer; border-bottom: 3px solid transparent; margin-bottom: -2px; font-family: var(--font-body); letter-spacing: 0.5px; text-transform: uppercase; transition: color 0.15s; }
.tab.active { color: var(--arc-black); border-bottom: 3px solid var(--arc-black); }

/* Views */
#map-view, #list-view { flex: 1; overflow: hidden; display: none; flex-direction: column; }
#map-view.active, #list-view.active { display: flex; }

/* Map */
#map-filter-bar { padding: 10px 16px; display: flex; gap: 8px; flex-wrap: wrap; background: var(--arc-white); border-bottom: 1px solid var(--arc-gray-100); flex-shrink: 0; }
.mfb { font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--arc-gray-300); background: transparent; color: var(--arc-gray-700); cursor: pointer; font-family: var(--font-body); transition: all 0.15s; }
.mfb.on { background: var(--arc-black); color: var(--arc-white); border-color: var(--arc-black); }
#map-wrap { flex: 1; position: relative; }
#leaflet-map { width: 100%; height: 100%; }

/* Map popup panel */
#map-panel { display: none; position: absolute; bottom: 0; left: 0; right: 0; background: var(--arc-white); border-top: 3px solid var(--arc-black); padding: 20px; z-index: 1000; }
#map-panel.open { display: block; }
#mp-close { float: right; cursor: pointer; color: var(--arc-gray-500); font-size: 20px; line-height: 1; background: none; border: none; font-family: var(--font-body); }
#mp-name { font-family: var(--font-headline); font-size: 20px; font-weight: 700; color: var(--arc-black); margin-bottom: 4px; }
#mp-sub { font-size: 13px; color: var(--arc-gray-500); font-family: var(--font-data); margin-bottom: 4px; }
#mp-note { font-size: 13px; color: var(--arc-gray-700); font-style: italic; margin-bottom: 16px; min-height: 4px; }
.mp-btns { display: flex; gap: 10px; }
.mp-btn { flex: 1; display: block; text-align: center; padding: 12px; text-decoration: none; font-size: 14px; font-weight: 700; font-family: var(--font-body); letter-spacing: 0.3px; }
.mp-btn-primary { background: var(--arc-red); color: var(--arc-white); }
.mp-btn-primary:hover { background: #c4151f; }
.mp-btn-secondary { background: var(--arc-white); color: var(--arc-black); border: 2px solid var(--arc-black); }
.mp-btn-secondary:hover { background: var(--arc-cream); }

/* List */
#list-filter-bar { padding: 10px 16px; display: flex; gap: 8px; flex-wrap: wrap; background: var(--arc-white); border-bottom: 1px solid var(--arc-gray-100); flex-shrink: 0; }
.lfb { font-size: 12px; font-weight: 600; padding: 5px 14px; border-radius: 20px; border: 1px solid var(--arc-gray-300); background: transparent; color: var(--arc-gray-700); cursor: pointer; font-family: var(--font-body); transition: all 0.15s; }
.lfb.on { background: var(--arc-black); color: var(--arc-white); border-color: var(--arc-black); }
#list-scroll { flex: 1; overflow-y: auto; }
.sec-hdr { padding: 8px 16px; font-size: 11px; font-weight: 700; color: var(--arc-gray-500); background: var(--arc-cream); border-bottom: 1px solid var(--arc-gray-100); text-transform: uppercase; letter-spacing: 1px; font-family: var(--font-data); }
.row { padding: 12px 16px; border-bottom: 1px solid var(--arc-gray-100); display: flex; justify-content: space-between; align-items: center; background: var(--arc-white); }
.row:hover { background: var(--arc-cream); }
.rname { font-size: 15px; font-weight: 600; color: var(--arc-black); }
.rmeta { font-size: 12px; color: var(--arc-gray-500); margin-top: 2px; font-family: var(--font-data); }
.rtag { font-size: 11px; padding: 2px 8px; border-radius: 3px; font-family: var(--font-data); font-weight: 500; white-space: nowrap; }
.maps-a { font-size: 12px; color: var(--arc-red); padding: 3px 10px; border: 1px solid var(--arc-red); text-decoration: none; font-weight: 600; margin-top: 4px; display: inline-block; font-family: var(--font-body); }
.maps-a:hover { background: var(--arc-red); color: var(--arc-white); }

/* Leaflet overrides */
.leaflet-popup-content-wrapper { border-radius: 0; border: 2px solid var(--arc-black); font-family: var(--font-body); }
.leaflet-popup-tip { display: none; }

::-webkit-scrollbar { width: 6px; }
::-webkit-scrollbar-track { background: var(--arc-cream); }
::-webkit-scrollbar-thumb { background: var(--arc-gray-300); }
</style>
</head>
<body>

<header>
  <div class="header-left">
    <div>
      <h1>London Restaurants</h1>
      <p>50+ curated spots · Mayfair to Knightsbridge</p>
    </div>
  </div>
</header>

<div id="tabs">
  <div class="tab active" onclick="switchTab('map')">Map</div>
  <div class="tab" onclick="switchTab('list')">List</div>
</div>

<div id="map-view" class="active">
  <div id="map-filter-bar"></div>
  <div id="map-wrap">
    <div id="leaflet-map"></div>
    <div id="map-panel">
      <button id="mp-close" onclick="closePanel()">✕</button>
      <div id="mp-name"></div>
      <div id="mp-sub"></div>
      <div id="mp-note"></div>
      <div class="mp-btns">
        <a id="mp-directions" class="mp-btn mp-btn-primary" href="#" target="_blank">Get Directions →</a>
        <a id="mp-search" class="mp-btn mp-btn-secondary" href="#" target="_blank">Google It</a>
      </div>
    </div>
  </div>
</div>

<div id="list-view">
  <div id="list-filter-bar"></div>
  <div id="list-scroll"></div>
</div>

<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<script>

  {name:"Benares",area:"Mayfair",cuisine:"Indian",meal:["lunch","dinner"],note:"",lat:51.5120,lng:-0.1461},
  {name:"Tamarind",area:"Mayfair",cuisine:"Indian",meal:["lunch","dinner"],note:"",lat:51.5097,lng:-0.1441},

  {name:"Fishy Kitty",area:"Mayfair",cuisine:"Seafood",meal:["lunch","dinner"],note:"",lat:51.5113,lng:-0.1443},

  {name:"Pétrus",area:"Belgravia",cuisine:"French",meal:["lunch","dinner"],note:"Gordon Ramsay",lat:51.4988,lng:-0.1558},
  {name:"Aqua",area:"Mayfair",cuisine:"Modern European",meal:["lunch","dinner"],note:"",lat:51.5117,lng:-0.1440},
  {name:"Norma",area:"Fitzrovia",cuisine:"Italian",meal:["lunch","dinner"],note:"Sicilian",lat:51.5182,lng:-0.1432},
  {name:"Hatched",area:"Mayfair",cuisine:"Modern British",meal:["lunch","dinner"],note:"",lat:51.5100,lng:-0.1443},
  {name:"No. 22",area:"Mayfair",cuisine:"Modern British",meal:["lunch","dinner"],note:"",lat:51.5098,lng:-0.1450},
  {name:"Cut at 45 Park Lane",area:"Mayfair",cuisine:"Steakhouse",meal:["lunch","dinner"],note:"Wolfgang Puck",lat:51.5072,lng:-0.1511},
  {name:"Socca",area:"Mayfair",cuisine:"French",meal:["lunch","dinner"],note:"",lat:51.5112,lng:-0.1470},
  {name:"Ginza",area:"Mayfair",cuisine:"Japanese",meal:["lunch","dinner"],note:"Complimentary champagne",lat:51.5108,lng:-0.1455},
  {name:"Mercado Mayfair",area:"Mayfair",cuisine:"Latin",meal:["lunch","dinner"],note:"",lat:51.5130,lng:-0.1480},
  {name:"Italian Bear Chocolate",area:"Mayfair",cuisine:"Cafe",meal:["breakfast"],note:"Kids favourite",lat:51.5090,lng:-0.1430},
];

const COLORS={
  "Italian":"#c0392b","British":"#1a5276","French":"#6c3483","Indian":"#d35400",
  "Japanese":"#0e6655","Chinese":"#922b21","Greek":"#1e8449","Seafood":"#1f618d",
  "Steakhouse":"#641e16","Modern British":"#154360","Modern European":"#4a235a",
  "European":"#1b4f72","Bakery":"#784212","Spanish":"#7d6608","Lebanese":"#6e2f0a",
  "Peruvian":"#145a32","Asian/Italian":"#512e5f","American":"#212f3c",
  "Latin":"#78281f","Cafe":"#4d2600","Modern":"#0b3d2e"
};

function mapsUrl(r){return`https://www.google.com/maps/search/${encodeURIComponent(r.name+' restaurant '+r.area+' London')}`;}

let map, markers=[], mapFilter='all', listFilter='all';

function initMap(){
  map=L.map('leaflet-map',{center:[51.508,-0.145],zoom:14});
  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png',{
    attribution:'© <a href="https://openstreetmap.org">OpenStreetMap</a>'
  }).addTo(map);
  plotMarkers();
}

function plotMarkers(){
  markers.forEach(m=>map.removeLayer(m));
  markers=[];
  R.filter(r=>mapFilter==='all'||r.meal.includes(mapFilter)).forEach(r=>{
    const c=COLORS[r.cuisine]||'#555';
    const icon=L.divIcon({
      html:`<div style="width:14px;height:14px;border-radius:50%;background:${c};border:2.5px solid white;box-shadow:0 1px 5px rgba(0,0,0,0.5)"></div>`,
      iconSize:[14,14],iconAnchor:[7,7],className:''
    });
    const m=L.marker([r.lat,r.lng],{icon}).addTo(map);
    m.on('click',()=>showPanel(r));
    markers.push(m);
  });
}

function showPanel(r){
  document.getElementById('mp-name').textContent=r.name;
  document.getElementById('mp-sub').textContent=r.cuisine+' · '+r.area+' · '+r.meal.map(m=>m[0].toUpperCase()+m.slice(1)).join(', ');
  document.getElementById('mp-note').textContent=r.note||'';
  document.getElementById('mp-directions').href=`https://www.google.com/maps/dir/?api=1&destination=${encodeURIComponent(r.name+' '+r.area+' London')}`;
  document.getElementById('mp-search').href=`https://www.google.com/search?q=${encodeURIComponent(r.name+' restaurant London')}`;
  document.getElementById('map-panel').classList.add('open');
}

function closePanel(){document.getElementById('map-panel').classList.remove('open');}

function buildMapFilters(){
  const bar=document.getElementById('map-filter-bar');
  bar.innerHTML=['all','breakfast','lunch','dinner'].map(f=>
    `<button class="mfb ${mapFilter===f?'on':''}" onclick="setMapFilter('${f}')">${f==='all'?'All':f[0].toUpperCase()+f.slice(1)}</button>`
  ).join('');
}

function setMapFilter(f){mapFilter=f;buildMapFilters();plotMarkers();}

function buildList(){
  const bar=document.getElementById('list-filter-bar');
  bar.innerHTML=['all','breakfast','lunch','dinner'].map(f=>
    `<button class="lfb ${listFilter===f?'on':''}" onclick="setListFilter('${f}')">${f==='all'?'All':f[0].toUpperCase()+f.slice(1)}</button>`
  ).join('');
  const filtered=listFilter==='all'?R:R.filter(r=>r.meal.includes(listFilter));
  const grouped={};
  filtered.forEach(r=>{if(!grouped[r.area])grouped[r.area]=[];grouped[r.area].push(r);});
  let html='';
  Object.keys(grouped).sort().forEach(area=>{
    html+=`<div class="sec-hdr">${area}</div>`;
    grouped[area].forEach(r=>{
      const c=COLORS[r.cuisine]||'#555';
      html+=`<div class="row">
        <div style="flex:1">
          <div class="rname">${r.name}</div>
          <div class="rmeta">${r.meal.map(m=>m[0].toUpperCase()+m.slice(1)).join(' · ')}${r.note?' · '+r.note:''}</div>
        </div>
        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:4px;margin-left:12px">
          <span class="rtag" style="background:${c}18;color:${c}">${r.cuisine}</span>
          <a class="maps-a" href="${mapsUrl(r)}" target="_blank">Map</a>
        </div>
      </div>`;
    });
  });
  document.getElementById('list-scroll').innerHTML=html;
}

function setListFilter(f){listFilter=f;buildList();}

function switchTab(t){
  document.querySelectorAll('.tab').forEach((el,i)=>el.classList.toggle('active',['map','list'][i]===t));
  document.getElementById('map-view').classList.toggle('active',t==='map');
  document.getElementById('list-view').classList.toggle('active',t==='list');
  if(t==='list')buildList();
  if(t==='map'&&map)setTimeout(()=>map.invalidateSize(),50);
}

buildMapFilters();
initMap();
</script>
</body>
</html>
